<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - EGY MT</title>
    
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
    @font-face {
  font-family: 'Cairo';
  src: url('fonts/static/Cairo-SemiBold.ttf') format('woff2');
  font-weight: normal;
  font-style: normal;
}

/* تطبيقه على الموقع */
* {
    font-family: 'Cairo', sans-serif;
}

        /* --- المتغيرات والتنسيقات العامة --- */
        :root {
            --primary-blue: #3b5998;
            --primary-gradient: linear-gradient(135deg, #4160e0 0%, #2b4196 100%);
            --sidebar-bg: #8b99a8; /* درجة رمادي مزرق أكثر عمقاً */
            --sidebar-active: rgba(255, 255, 255, 0.2);
            --text-green: #2ecc71;
            --nav-text-green: #a8e6cf;
            --bg-light: #f0f4f8; /* خلفية أفتح لإبراز البطاقات */
            --card-shadow: 0 8px 20px rgba(0,0,0,0.04);
        }

        body {
            font-family: 'Cairo', sans-serif; /* تطبيق الخط الجديد */
            background-color: var(--bg-light);
            overflow-x: hidden;
            margin: 0;
            padding: 0;
            color: #333;
        }

        /* --- شريط التنقل العلوي --- */
        .custom-navbar {
            background: var(--primary-gradient);
            height: 75px;
            box-shadow: 0 4px 15px rgba(65, 96, 224, 0.2);
            z-index: 1050;
            position: fixed;
            top: 0;
            right: 0;
            left: 0;
            width: 100%;
        }

        .navbar-brand-custom {
            font-weight: 900;
            font-size: 1.8rem;
            letter-spacing: 1px;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .nav-profile-img {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.8);
            object-fit: cover;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            padding: 2px;
            background: white;
        }

        .nav-profile-info {
            line-height: 1.3;
            margin-right: 12px;
        }

        .nav-profile-name {
            font-size: 1rem;
            font-weight: 700;
        }

        .nav-profile-role {
            font-size: 0.85rem;
            color: var(--nav-text-green);
            font-weight: 600;
        }

        .btn-exit {
            border: 1.5px solid rgba(255,255,255,0.7);
            color: white;
            padding: 6px 18px;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-weight: 600;
            backdrop-filter: blur(5px);
        }

        .btn-exit:hover {
            background-color: white;
            color: var(--primary-blue);
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* --- زر القائمة المتحرك --- */
        .toggle-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            width: 42px;
            height: 42px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            padding: 0;
        }

        .toggle-btn:hover {
            background-color: rgba(255,255,255,0.2);
        }

        .toggle-btn span {
            display: block;
            width: 22px;
            height: 2.5px;
            background-color: white;
            border-radius: 3px;
            transition: all 0.3s ease-in-out;
        }

        .toggle-btn span:nth-child(2) {
            margin: 5px 0;
        }

        .toggle-btn.active span:nth-child(1) { transform: translateY(7.5px) rotate(45deg); }
        .toggle-btn.active span:nth-child(2) { opacity: 0; }
        .toggle-btn.active span:nth-child(3) { transform: translateY(-7.5px) rotate(-45deg); }

        /* --- القائمة الجانبية --- */
        .sidebar {
            background-color: var(--sidebar-bg);
            /* إضافة ظل داخلي خفيف يعطي عمقاً */
            box-shadow: inset -5px 0 15px rgba(0,0,0,0.03); 
            height: calc(100vh - 75px);
            position: fixed;
            top: 75px;
            right: 0;
            width: 270px;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            z-index: 1000;
            overflow-y: auto;
        }

        .sidebar-profile-section {
            padding: 25px 15px 15px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 15px;
        }

        .sidebar-profile-img {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            border: 3px solid white;
            object-fit: cover;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
            margin-bottom: 12px;
        }

        .sidebar-user-role {
            color: var(--text-green);
            font-size: 0.95rem;
            font-weight: 700;
            background: rgba(255,255,255,0.9);
            padding: 2px 10px;
            border-radius: 12px;
            display: inline-block;
        }

        .sidebar-nav {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .sidebar-nav li {
            padding: 0 15px;
            margin-bottom: 8px;
        }

        .sidebar-nav a {
            color: rgba(255,255,255,0.85);
            text-decoration: none;
            display: flex;
            align-items: center;
            padding: 14px 18px;
            font-size: 1.05rem;
            font-weight: 600;
            border-radius: 10px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        /* تأثير الرابط النشط */
        .sidebar-nav a.active {
            background-color: var(--sidebar-active);
            color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .sidebar-nav a.active::before {
            content: '';
            position: absolute;
            right: 0;
            top: 0;
            height: 100%;
            width: 4px;
            background-color: white;
            border-radius: 4px 0 0 4px;
        }

        .sidebar-nav a:hover:not(.active) {
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
            transform: translateX(-5px);
        }

        .sidebar-nav i {
            margin-left: 14px;
            font-size: 1.3rem;
        }

        /* --- منطقة المحتوى الرئيسي والبطاقات --- */
        .main-content {
            margin-right: 270px;
            margin-top: 75px;
            padding: 30px;
            min-height: calc(100vh - 75px);
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* تصميم بطاقات الإحصائيات */
        .stat-card {
            background: white;
            border-radius: 16px;
            border: none;
            box-shadow: var(--card-shadow);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            overflow: hidden;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 25px rgba(0,0,0,0.08);
        }

        .stat-icon {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
        }

        .icon-blue { background: rgba(65, 96, 224, 0.1); color: #4160e0; }
        .icon-green { background: rgba(46, 204, 113, 0.1); color: #2ecc71; }
        .icon-orange { background: rgba(253, 126, 20, 0.1); color: #fd7e14; }

        /* --- تجاوب الشاشات --- */
        @media (max-width: 768px) {
            .sidebar {
                right: -270px;
            }
            .sidebar.active {
                right: 0;
                box-shadow: -5px 0 25px rgba(0,0,0,0.15);
            }
            .main-content {
                margin-right: 0;
                padding: 20px 15px;
            }
            .sidebar-overlay {
                display: none;
                position: fixed;
                top: 75px;
                left: 0;
                width: 100%;
                height: calc(100vh - 75px);
                background-color: rgba(0,0,0,0.5);
                z-index: 999;
                backdrop-filter: blur(4px);
                transition: opacity 0.3s;
            }
            .sidebar-overlay.active {
                display: block;
            }
        }
        /* --- تنسيقات الجدول المخصص --- */
.custom-table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
}

.custom-table th {
    background-color: #f8f9fa; /* لون خلفية خفيف للرأس */
    color: #6c757d;
    font-weight: 700;
    font-size: 0.9rem;
    padding: 15px;
    border-bottom: 2px solid #e9ecef;
    white-space: nowrap;
}

.custom-table td {
    padding: 15px;
    vertical-align: middle;
    border-bottom: 1px solid #f1f3f5;
    color: #495057;
    font-size: 0.95rem;
}

/* تأثير التمرير على الصفوف */
.custom-table tbody tr {
    transition: all 0.2s ease;
}

.custom-table tbody tr:hover {
    background-color: rgba(65, 96, 224, 0.03); /* لون أزرق باهت جداً عند التمرير */
    transform: scale(1.002);
}

/* أزرار الإجراءات (تعديل، حذف، عرض) */
.action-btn {
    width: 32px;
    height: 32px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
    border: none;
    transition: all 0.2s ease;
    margin-left: 5px;
}
    
    .btn-view { background-color: #e0f2fe; color: #0284c7; }
    .btn-view:hover { background-color: #0284c7; color: white; }
    
    .btn-edit { background-color: #fef08a; color: #ca8a04; }
    .btn-edit:hover { background-color: #ca8a04; color: white; }
    
    .btn-delete { background-color: #fee2e2; color: #dc2626; }
    .btn-delete:hover { background-color: #dc2626; color: white; }
    
    /* شارات الحالة */
    .badge-custom {
        padding: 6px 12px;
        font-weight: 600;
        border-radius: 20px;
        font-size: 0.8rem;
    }
    /* تنسيق الصورة الرمزية المحلية (بديل الصورة) */
.local-avatar {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background-color: #f8f9fa; /* لون الخلفية */
    color: var(--primary-blue); /* لون الحروف */
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: 800;
    font-size: 1.1rem;
    border: 2px solid rgba(255,255,255,0.8);
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    /* لضمان عدم تشوه الدائرة */
    flex-shrink: 0; 
}

/* نسخة أكبر للقائمة الجانبية في الهاتف */
.sidebar-profile-section .local-avatar {
    width: 85px;
    height: 85px;
    font-size: 2rem;
    margin: 0 auto 12px auto;
}
    </style>
</head>
<body>

    <nav class="custom-navbar px-4 d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center">
            <button class="toggle-btn d-md-none" id="sidebarToggle" aria-label="تبديل القائمة">
                <span></span>
                <span></span>
                <span></span>
            </button>

            <div class="d-none d-md-flex align-items-center text-white" id="desktop-profile-container">
            </div>
        </div>

        <div class="navbar-brand-custom text-white">
            E<span class="text-warning">G</span>Y<sup style="font-size: 0.7rem; color: #a8e6cf;">MT</sup>
        </div>

        <div>
            <a href="#" class="btn-exit text-decoration-none d-flex align-items-center" onclick="logout()">
                <i class="bi bi-box-arrow-left ms-2 fs-5"></i> خروج
            </a>
        </div>
    </nav>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-profile-section d-md-none" id="mobile-profile-container">
        </div>
           <!-- <img src="https://ui-avatars.com/api/?name=Ahmed+Mansour&background=fff&color=000&rounded=true" alt="صورة الطبيب" class="sidebar-profile-img">
            <h5 class="text-white mt-2 mb-2 fw-bold">د. أحمد منصور</h5>
            <span class="sidebar-user-role">الطبيب العام</span>-->
        

        <ul class="sidebar-nav mt-3" id="sidebar-nav-list">
        </ul>
    </aside>

    <main class="main-content" id="mainContent">
        <span class="spinner-border spinner-border-sm ms-2"></span> جاري التحميل...
    </main>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
   <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script src="main_core.js"></script>

    <script>
        const sidebarToggle = document.getElementById('sidebarToggle');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');

        function toggleSidebar() {
            sidebarToggle.classList.toggle('active');
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
        }

        sidebarToggle.addEventListener('click', toggleSidebar);
        overlay.addEventListener('click', toggleSidebar);

        window.addEventListener('resize', () => {
            if (window.innerWidth > 768) {
                sidebarToggle.classList.remove('active');
                sidebar.classList.remove('active');
                overlay.classList.remove('active');
            }
        });

        window.addEventListener('load', () => {
            // 1. جلب بيانات الجلسة من التخزين المحلي
            const token = localStorage.getItem('jwt_token');
            const scriptUrl = localStorage.getItem('script_url');

            // 2. التحقق من وجود الصلاحية (إذا لم يوجد توكن، إطرده لصفحة الدخول)
            if (!token || !scriptUrl) {
                window.location.href = 'login.html';
                return;
            }

            // 3. حقن السكريبت الخاص بالصلاحية ديناميكياً
            let scriptElement = document.createElement('script');
            scriptElement.src = scriptUrl;
          //  Core.showAlert(scriptElement.src,'error')
            
            // عند نجاح تحميل ملف الصلاحية
            scriptElement.onload = () => {
                console.log(`[System] تم تحميل موديول الصلاحية بنجاح: ${scriptUrl}`);
                // إضافة زر تسجيل الخروج في الواجهة (اختياري لكن مهم)
                injectLogoutButton();
            };

            // في حال فشل تحميل الملف
            scriptElement.onerror = () => {
                Core.showAlert('حدث خطأ أثناء تحميل واجهة المستخدم.', 'error');
            };

            document.body.appendChild(scriptElement);
        });

        // دالة مساعدة لإضافة زر تسجيل الخروج في القائمة الجانبية
        

        function logout() {
            localStorage.removeItem('jwt_token');
            localStorage.removeItem('script_url');
            window.location.href = 'login.html';
        }
        
    </script>
</body>
</html>
